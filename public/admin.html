<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #1f2937;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }

      /* ── Auth gate ── */

      #auth-section {
        width: 360px;
        padding: 40px 32px;
      }

      #auth-section h1 {
        margin: 0 0 8px 0;
        font-size: 1.4rem;
        font-weight: 700;
      }

      #auth-section p {
        margin: 0 0 24px 0;
        color: #6b7280;
        font-size: 0.9rem;
      }

      .field {
        margin-bottom: 12px;
      }

      .field label {
        display: block;
        font-size: 0.85rem;
        font-weight: 500;
        margin-bottom: 4px;
        color: #374151;
      }

      /* ── Dashboard ── */

      #dashboard-section {
        width: 760px;
        display: none;
      }

      .dash-header {
        padding: 16px 24px;
        border-bottom: 1px solid #e5e7eb;
        background: #f9fafb;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .dash-header h1 {
        margin: 0;
        font-size: 1.2rem;
        font-weight: 700;
      }

      .panel {
        padding: 20px 24px;
        border-bottom: 1px solid #e5e7eb;
      }

      .panel:last-child {
        border-bottom: none;
      }

      .panel h2 {
        margin: 0 0 14px 0;
        font-size: 0.95rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #6b7280;
      }

      /* ── Tenant list ── */

      #tenant-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      #tenant-list li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px dashed #e5e7eb;
      }

      #tenant-list li:last-child {
        border-bottom: none;
      }

      .tenant-info .tenant-name {
        font-weight: 500;
        font-size: 0.95rem;
      }

      .tenant-info .tenant-id {
        font-family: monospace;
        font-size: 0.75rem;
        color: #9ca3af;
        margin-top: 2px;
      }

      .empty-tenants {
        color: #9ca3af;
        font-size: 0.9rem;
        padding: 8px 0;
      }

      /* ── Create tenant form ── */

      .input-row {
        display: flex;
        gap: 8px;
      }

      input[type="text"],
      input[type="email"],
      input[type="password"] {
        flex: 1;
        padding: 10px 12px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 0.9rem;
        font-family: inherit;
        width: 100%;
      }

      input:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }

      /* ── Ingest modal ── */

      #ingest-modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.45);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }
      #ingest-modal.open { display: flex; }

      .im-card {
        background: #fff;
        border-radius: 16px;
        padding: 28px 32px;
        width: 560px;
        max-width: 95vw;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      }
      .im-card h2 { margin: 0 0 20px; font-size: 1.1rem; font-weight: 700; }

      .im-section { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #e5e7eb; }
      .im-section:last-of-type { border-bottom: none; margin-bottom: 0; }
      .im-section h3 {
        font-size: 0.8rem; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.06em; color: #6b7280; margin: 0 0 12px;
      }

      .im-radio-row { display: flex; gap: 20px; margin-bottom: 10px; font-size: 0.875rem; }
      .im-radio-row label { display: flex; align-items: center; gap: 6px; cursor: pointer; }

      #im-product-json {
        width: 100%; font-family: monospace; font-size: 0.78rem;
        border: 1px solid #d1d5db; border-radius: 8px; padding: 10px;
        resize: vertical; min-height: 120px;
      }
      #im-product-json:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }

      .im-articles-grid { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
      .im-article-row { display: flex; align-items: center; gap: 8px; font-size: 0.875rem; cursor: pointer; }
      .im-article-row input[type="checkbox"] { width: 15px; height: 15px; accent-color: #667eea; cursor: pointer; flex-shrink: 0; }

      .im-btn-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
      .im-btn { padding: 7px 14px; font-size: 0.82rem; }

      /* ── Buttons ── */

      button {
        padding: 10px 16px;
        border: none;
        background: #2563eb;
        color: #ffffff;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 500;
        font-size: 0.9rem;
        font-family: inherit;
        transition: background 0.2s;
        white-space: nowrap;
      }

      button:hover:not(:disabled) {
        background: #1d4ed8;
      }

      button:disabled {
        background: #94a3b8;
        cursor: not-allowed;
      }

      .btn-danger {
        background: #ef4444;
        padding: 6px 12px;
        font-size: 0.8rem;
      }

      .btn-danger:hover:not(:disabled) {
        background: #dc2626;
      }

      .btn-secondary {
        background: #6b7280;
      }

      .btn-secondary:hover:not(:disabled) {
        background: #4b5563;
      }

      /* ── Style modal ── */

      #style-modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.45);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }

      #style-modal.open { display: flex; }

      .sm-card {
        background: #fff;
        border-radius: 16px;
        padding: 28px 32px;
        width: 420px;
        max-width: 95vw;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      }

      .sm-card h2 {
        margin: 0 0 20px;
        font-size: 1.1rem;
        font-weight: 700;
      }

      .sm-field { margin-bottom: 16px; }
      .sm-field label { display: block; font-size: 0.85rem; font-weight: 500; color: #374151; margin-bottom: 6px; }

      .sm-color-row { display: flex; gap: 8px; align-items: center; }
      .sm-color-row input[type="color"] { width: 40px; height: 36px; padding: 2px; border: 1px solid #d1d5db; border-radius: 6px; cursor: pointer; flex-shrink: 0; }
      .sm-color-row input[type="text"] { width: 100px; flex: none; }

      .sm-preview-btn {
        width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
        border: 2px solid #e5e7eb;
      }

      .sm-radio-row { display: flex; gap: 20px; margin-top: 4px; font-size: 0.875rem; }
      .sm-radio-row label { display: flex; align-items: center; gap: 6px; font-weight: 400; cursor: pointer; }

      .sm-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

      /* ── Status messages ── */

      .msg {
        font-size: 0.85rem;
        padding: 8px 12px;
        border-radius: 6px;
        margin-top: 10px;
        display: none;
      }

      .msg.success {
        background: #d1fae5;
        color: #065f46;
        display: block;
      }

      .msg.error {
        background: #fee2e2;
        color: #991b1b;
        display: block;
      }
    </style>
  </head>
  <body>

    <!-- ── Auth gate ─────────────────────────────────────────────────────── -->
    <div id="auth-section" class="card">
      <h1>Admin Dashboard</h1>
      <p>Sign in with your Supabase account. You must have the <code>admin</code> role in <code>app_metadata</code>.</p>
      <div class="field">
        <label for="email-input">Email</label>
        <input id="email-input" type="email" placeholder="admin@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label for="password-input">Password</label>
        <input id="password-input" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <div id="auth-error" class="msg error" style="margin-bottom: 0;"></div>
      <button id="sign-in-btn" style="width: 100%; margin-top: 12px;">Sign In</button>
    </div>

    <!-- ── Dashboard ─────────────────────────────────────────────────────── -->
    <div id="dashboard-section" class="card">
      <div class="dash-header">
        <h1>Admin Dashboard</h1>
        <button class="btn-secondary" id="sign-out-btn">Sign Out</button>
      </div>

      <!-- Tenant list -->
      <div class="panel">
        <h2>Tenants</h2>
        <ul id="tenant-list"><li class="empty-tenants">Loading…</li></ul>
        <div id="tenant-list-error" class="msg error"></div>
      </div>

      <!-- Create tenant -->
      <div class="panel">
        <h2>Create Tenant</h2>
        <div class="input-row">
          <input id="new-tenant-name" type="text" placeholder="Tenant name" />
          <button id="create-tenant-btn">Create</button>
        </div>
        <div id="create-msg" class="msg"></div>
      </div>

      <!-- Global ingest -->
      <div class="panel">
        <h2>Content Ingestion</h2>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button id="ingest-all-products-btn">↺ Re-ingest Products — All Tenants</button>
          <button id="ingest-all-articles-btn">↺ Re-ingest Articles — All Tenants</button>
        </div>
        <div id="ingest-global-msg" class="msg"></div>
      </div>
    </div>

    <!-- ── Ingest / Content modal ───────────────────────────────────────────── -->
    <div id="ingest-modal">
      <div class="im-card">
        <h2>Content — <span id="im-tenant-name"></span></h2>

        <div class="im-section">
          <h3>Products</h3>
          <div class="im-radio-row">
            <label><input type="radio" name="im-prod-src" id="im-prod-global" value="global" checked> Global catalog (products.json)</label>
            <label><input type="radio" name="im-prod-src" id="im-prod-custom" value="custom"> Custom catalog (JSON)</label>
          </div>
          <div id="im-custom-area" style="display:none;margin-bottom:10px">
            <textarea id="im-product-json" rows="7"
              placeholder='[{"id":"1","title":"Product","brand":"Brand","category":"gear","price":49.99,"currency":"USD","inStock":true,"rating":4.5,"description":"..."}]'></textarea>
            <div class="im-btn-row">
              <button id="im-save-products" class="im-btn">Save catalog</button>
              <button id="im-clear-products" class="btn-secondary im-btn">Use global</button>
            </div>
            <div id="im-save-products-msg" class="msg"></div>
          </div>
          <div class="im-btn-row">
            <button id="im-ingest-products" class="im-btn">Ingest Products</button>
          </div>
          <div id="im-products-msg" class="msg"></div>
        </div>

        <div class="im-section">
          <h3>Articles <span style="font-size:0.75rem;font-weight:400;text-transform:none;letter-spacing:0;color:#9ca3af">— select which global articles to enable for this tenant</span></h3>
          <div id="im-articles-list" class="im-articles-grid">Loading…</div>
          <div class="im-btn-row">
            <button id="im-save-articles" class="im-btn">Save selection</button>
            <button id="im-ingest-articles" class="im-btn">Ingest Articles</button>
          </div>
          <div id="im-articles-msg" class="msg"></div>
        </div>

        <div class="sm-actions" style="margin-top:16px">
          <button class="btn-secondary" id="im-close">Close</button>
        </div>
      </div>
    </div>

    <!-- ── Style modal ────────────────────────────────────────────────────── -->
    <div id="style-modal">
      <div class="sm-card">
        <h2>Widget Style — <span id="sm-tenant-name"></span></h2>

        <div class="sm-field">
          <label>Primary colour <small style="color:#9ca3af">(send button, user messages)</small></label>
          <div class="sm-color-row">
            <input type="color" id="sm-primary-picker" />
            <input type="text"  id="sm-primary-hex" maxlength="7" placeholder="#2563eb" />
          </div>
        </div>

        <div class="sm-field">
          <label>Trigger button colour</label>
          <div class="sm-color-row">
            <input type="color" id="sm-btn-picker" />
            <input type="text"  id="sm-btn-hex" maxlength="7" placeholder="#667eea" />
            <div id="sm-btn-preview" class="sm-preview-btn"></div>
          </div>
        </div>

        <div class="sm-field">
          <label>Header background colour</label>
          <div class="sm-color-row">
            <input type="color" id="sm-header-picker" />
            <input type="text"  id="sm-header-hex" maxlength="7" placeholder="#f9fafb" />
          </div>
        </div>

        <div class="sm-field">
          <label>Chat title</label>
          <input type="text" id="sm-title" placeholder="🛍️ Product Assistant" style="width:100%" />
        </div>

        <div class="sm-field">
          <label>Subtitle</label>
          <input type="text" id="sm-subtitle" placeholder="Ask about products, prices, or features" style="width:100%" />
        </div>

        <div class="sm-field">
          <label>Position</label>
          <div class="sm-radio-row">
            <label><input type="radio" name="sm-position" value="bottom-right" checked /> Bottom-right</label>
            <label><input type="radio" name="sm-position" value="bottom-left" /> Bottom-left</label>
          </div>
        </div>

        <div id="sm-msg" class="msg"></div>
        <div class="sm-actions">
          <button class="btn-danger" id="sm-reset" style="margin-right:auto">Reset to defaults</button>
          <button class="btn-secondary" id="sm-cancel">Cancel</button>
          <button id="sm-save">Save</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const { createClient } = supabase;

      // ── Bootstrap Supabase client ────────────────────────────────────────

      let sbClient = null;
      let accessToken = null;
      let tenants = [];

      async function initSupabase() {
        const res = await fetch("/admin-config");
        if (!res.ok) throw new Error("Could not load Supabase config from server.");
        const { supabaseUrl, supabaseAnonKey } = await res.json();
        if (!supabaseUrl || !supabaseAnonKey) throw new Error("Supabase URL or anon key not configured on server.");
        sbClient = createClient(supabaseUrl, supabaseAnonKey);
      }

      // ── Helpers ──────────────────────────────────────────────────────────

      const apiHeaders = () => ({
        "Authorization": `Bearer ${accessToken}`,
        "Content-Type": "application/json"
      });

      const showMsg = (id, text, type) => {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = `msg ${type}`;
      };

      const hideMsg = (id) => {
        const el = document.getElementById(id);
        el.className = "msg";
        el.textContent = "";
      };

      const escHtml = (str) => String(str).replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));

      // ── Tenant rendering ─────────────────────────────────────────────────

      const renderTenantList = () => {
        const ul = document.getElementById("tenant-list");
        if (tenants.length === 0) {
          ul.innerHTML = '<li class="empty-tenants">No tenants yet.</li>';
        } else {
          ul.innerHTML = tenants.map(t => `
            <li>
              <div class="tenant-info">
                <div class="tenant-name">${escHtml(t.name)}</div>
                <div class="tenant-id">${escHtml(t.id)}</div>
                <div class="tenant-id" title="${escHtml(t.widgetKey)}">${escHtml(t.widgetKey)}</div>
              </div>
              <div style="display:flex;gap:6px;flex-shrink:0">
                <button class="btn-secondary btn-style" style="padding:6px 10px;font-size:0.8rem" data-id="${escHtml(t.id)}">Style</button>
                <button class="btn-secondary btn-content" style="padding:6px 10px;font-size:0.8rem" data-id="${escHtml(t.id)}">Content</button>
                <button class="btn-secondary btn-copy" style="padding:6px 10px;font-size:0.8rem" data-key="${escHtml(t.widgetKey)}">Copy snippet</button>
                <button class="btn-danger" data-id="${escHtml(t.id)}" data-name="${escHtml(t.name)}">Delete</button>
              </div>
            </li>
          `).join("");
          ul.querySelectorAll(".btn-danger").forEach(btn => {
            btn.addEventListener("click", () => deleteTenant(btn.dataset.id, btn.dataset.name));
          });
          ul.querySelectorAll(".btn-copy").forEach(btn => {
            btn.addEventListener("click", () => {
              const snippet = `<script src="${window.location.origin}/widget.js" data-widget-key="${btn.dataset.key}"><\/script>`;
              navigator.clipboard.writeText(snippet).then(() => {
                btn.textContent = "Copied!";
                setTimeout(() => { btn.textContent = "Copy snippet"; }, 2000);
              });
            });
          });
          ul.querySelectorAll(".btn-style").forEach(btn => {
            btn.addEventListener("click", () => {
              const tenant = tenants.find(t => t.id === btn.dataset.id);
              if (tenant) openStyleModal(tenant);
            });
          });
          ul.querySelectorAll(".btn-content").forEach(btn => {
            btn.addEventListener("click", () => {
              const tenant = tenants.find(t => t.id === btn.dataset.id);
              if (tenant) openIngestModal(tenant);
            });
          });
        }
      };

      // ── API calls ────────────────────────────────────────────────────────

      const loadTenants = async () => {
        hideMsg("tenant-list-error");
        try {
          const res = await fetch("/tenants", { headers: apiHeaders() });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          tenants = data.tenants;
          renderTenantList();
        } catch (e) {
          showMsg("tenant-list-error", "Failed to load tenants: " + e.message, "error");
        }
      };

      const signIn = async () => {
        const email = document.getElementById("email-input").value.trim();
        const password = document.getElementById("password-input").value;
        if (!email || !password) return;
        hideMsg("auth-error");
        const btn = document.getElementById("sign-in-btn");
        btn.disabled = true;
        btn.textContent = "Signing in…";
        try {
          const { data, error } = await sbClient.auth.signInWithPassword({ email, password });
          if (error) {
            showMsg("auth-error", error.message, "error");
            return;
          }
          // Verify admin role by calling a protected endpoint
          const token = data.session.access_token;
          const check = await fetch("/tenants", { headers: { "Authorization": `Bearer ${token}` } });
          if (check.status === 403) {
            showMsg("auth-error", "Your account does not have the admin role.", "error");
            await sbClient.auth.signOut();
            return;
          }
          if (!check.ok) throw new Error(`Server returned ${check.status}`);
          accessToken = token;
          showDashboard();
        } catch (e) {
          showMsg("auth-error", "Error: " + e.message, "error");
        } finally {
          btn.disabled = false;
          btn.textContent = "Sign In";
        }
      };

      const showDashboard = async () => {
        document.getElementById("auth-section").style.display = "none";
        document.getElementById("dashboard-section").style.display = "block";
        await loadTenants();
      };

      const showAuthGate = async () => {
        accessToken = null;
        tenants = [];
        await sbClient.auth.signOut();
        document.getElementById("dashboard-section").style.display = "none";
        document.getElementById("auth-section").style.display = "block";
        document.getElementById("email-input").value = "";
        document.getElementById("password-input").value = "";
        hideMsg("auth-error");
      };

      const createTenant = async () => {
        const name = document.getElementById("new-tenant-name").value.trim();
        if (!name) return;
        hideMsg("create-msg");
        const btn = document.getElementById("create-tenant-btn");
        btn.disabled = true;
        try {
          const id = crypto.randomUUID();
          const res = await fetch("/tenants", {
            method: "POST",
            headers: apiHeaders(),
            body: JSON.stringify({ id, name })
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || `HTTP ${res.status}`);
          }
          document.getElementById("new-tenant-name").value = "";
          showMsg("create-msg", `Created — ID: ${id}`, "success");
          await loadTenants();
        } catch (e) {
          showMsg("create-msg", "Error: " + e.message, "error");
        } finally {
          btn.disabled = false;
        }
      };

      const deleteTenant = async (id, name) => {
        if (!confirm(`Delete tenant "${name}"?\n\nThis will permanently remove all their products and articles.`)) return;
        hideMsg("tenant-list-error");
        try {
          const res = await fetch(`/tenants/${encodeURIComponent(id)}`, {
            method: "DELETE",
            headers: apiHeaders()
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || `HTTP ${res.status}`);
          }
          await loadTenants();
        } catch (e) {
          showMsg("tenant-list-error", "Delete failed: " + e.message, "error");
        }
      };

      // ── Style modal ──────────────────────────────────────────────────────

      let styleModalTenantId = null;

      const smModal         = document.getElementById("style-modal");
      const smPrimPicker    = document.getElementById("sm-primary-picker");
      const smPrimHex       = document.getElementById("sm-primary-hex");
      const smBtnPicker     = document.getElementById("sm-btn-picker");
      const smBtnHex        = document.getElementById("sm-btn-hex");
      const smBtnPreview    = document.getElementById("sm-btn-preview");
      const smHeaderPicker  = document.getElementById("sm-header-picker");
      const smHeaderHex     = document.getElementById("sm-header-hex");

      function syncColor(picker, hex, preview) {
        picker.addEventListener("input", () => {
          hex.value = picker.value;
          if (preview) preview.style.background = picker.value;
        });
        hex.addEventListener("input", () => {
          if (/^#[0-9a-fA-F]{6}$/.test(hex.value)) {
            picker.value = hex.value;
            if (preview) preview.style.background = hex.value;
          }
        });
      }
      syncColor(smPrimPicker,   smPrimHex,   null);
      syncColor(smBtnPicker,    smBtnHex,    smBtnPreview);
      syncColor(smHeaderPicker, smHeaderHex, null);

      const openStyleModal = (tenant) => {
        styleModalTenantId = tenant.id;
        document.getElementById("sm-tenant-name").textContent = tenant.name;
        const s = tenant.widgetSettings || {};
        const primary = s.primaryColor || "#2563eb";
        const btn     = s.buttonColor  || "#667eea";
        const header  = s.headerColor  || "#f9fafb";
        smPrimPicker.value   = primary; smPrimHex.value   = primary;
        smBtnPicker.value    = btn;     smBtnHex.value    = btn;
        smBtnPreview.style.background = btn;
        smHeaderPicker.value = header;  smHeaderHex.value = header;
        document.getElementById("sm-title").value    = s.title    || "";
        document.getElementById("sm-subtitle").value = s.subtitle || "";
        document.querySelector(`input[name="sm-position"][value="${s.position || "bottom-right"}"]`).checked = true;
        hideMsg("sm-msg");
        smModal.classList.add("open");
      };

      const closeStyleModal = () => {
        smModal.classList.remove("open");
        styleModalTenantId = null;
      };

      const saveStyle = async () => {
        if (!styleModalTenantId) return;
        const position = document.querySelector('input[name="sm-position"]:checked').value;
        const body = {
          primaryColor: smPrimHex.value    || undefined,
          buttonColor:  smBtnHex.value     || undefined,
          headerColor:  smHeaderHex.value  || undefined,
          title:        document.getElementById("sm-title").value.trim()    || undefined,
          subtitle:     document.getElementById("sm-subtitle").value.trim() || undefined,
          position,
        };
        // strip undefined
        Object.keys(body).forEach(k => body[k] === undefined && delete body[k]);
        hideMsg("sm-msg");
        const saveBtn = document.getElementById("sm-save");
        saveBtn.disabled = true;
        try {
          const res = await fetch(`/tenants/${encodeURIComponent(styleModalTenantId)}/settings`, {
            method: "PATCH",
            headers: apiHeaders(),
            body: JSON.stringify(body),
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || `HTTP ${res.status}`);
          }
          const { settings } = await res.json();
          const t = tenants.find(t => t.id === styleModalTenantId);
          if (t) t.widgetSettings = settings;
          showMsg("sm-msg", "Saved!", "success");
          setTimeout(closeStyleModal, 800);
        } catch (e) {
          showMsg("sm-msg", "Error: " + e.message, "error");
        } finally {
          saveBtn.disabled = false;
        }
      };

      document.getElementById("sm-cancel").addEventListener("click", closeStyleModal);
      document.getElementById("sm-save").addEventListener("click", saveStyle);
      document.getElementById("sm-reset").addEventListener("click", async () => {
        if (!styleModalTenantId) return;
        if (!confirm("Reset all widget styles to defaults?")) return;
        const btn = document.getElementById("sm-reset");
        btn.disabled = true;
        try {
          const res = await fetch(`/tenants/${encodeURIComponent(styleModalTenantId)}/settings`, {
            method: "PATCH",
            headers: apiHeaders(),
            body: JSON.stringify({}),
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const t = tenants.find(t => t.id === styleModalTenantId);
          if (t) t.widgetSettings = {};
          showMsg("sm-msg", "Reset to defaults.", "success");
          setTimeout(closeStyleModal, 800);
        } catch (e) {
          showMsg("sm-msg", "Error: " + e.message, "error");
        } finally {
          btn.disabled = false;
        }
      });
      smModal.addEventListener("click", (e) => { if (e.target === smModal) closeStyleModal(); });

      // ── Ingest modal ─────────────────────────────────────────────────────

      let ingestModalTenantId = null;
      let availableArticles = [];

      const imModal = document.getElementById("ingest-modal");

      const openIngestModal = async (tenant) => {
        ingestModalTenantId = tenant.id;
        document.getElementById("im-tenant-name").textContent = tenant.name;
        hideMsg("im-products-msg");
        hideMsg("im-articles-msg");
        hideMsg("im-save-products-msg");

        // Products section
        if (tenant.tenantProductData && tenant.tenantProductData.length > 0) {
          document.getElementById("im-prod-custom").checked = true;
          document.getElementById("im-custom-area").style.display = "block";
          document.getElementById("im-product-json").value = JSON.stringify(tenant.tenantProductData, null, 2);
        } else {
          document.getElementById("im-prod-global").checked = true;
          document.getElementById("im-custom-area").style.display = "none";
          document.getElementById("im-product-json").value = "";
        }

        // Articles section
        document.getElementById("im-articles-list").textContent = "Loading…";
        imModal.classList.add("open");

        try {
          const res = await fetch("/admin/articles", { headers: apiHeaders() });
          const data = await res.json();
          availableArticles = data.articles || [];
          const enabled = tenant.enabledArticles; // null = all, [] = none, [...] = specific
          const listEl = document.getElementById("im-articles-list");
          if (availableArticles.length === 0) {
            listEl.textContent = "No articles found.";
          } else {
            listEl.innerHTML = availableArticles.map(a => `
              <label class="im-article-row">
                <input type="checkbox" value="${escHtml(a)}"
                  ${enabled === null || enabled.includes(a) ? "checked" : ""}>
                ${escHtml(a)}
              </label>
            `).join("");
          }
        } catch (e) {
          document.getElementById("im-articles-list").textContent = "Failed to load articles.";
        }
      };

      const closeIngestModal = () => {
        imModal.classList.remove("open");
        ingestModalTenantId = null;
      };

      document.getElementById("im-prod-global").addEventListener("change", () => {
        document.getElementById("im-custom-area").style.display = "none";
      });
      document.getElementById("im-prod-custom").addEventListener("change", () => {
        document.getElementById("im-custom-area").style.display = "block";
      });

      document.getElementById("im-save-products").addEventListener("click", async () => {
        if (!ingestModalTenantId) return;
        hideMsg("im-save-products-msg");
        let parsed;
        try { parsed = JSON.parse(document.getElementById("im-product-json").value); }
        catch { showMsg("im-save-products-msg", "Invalid JSON.", "error"); return; }
        const btn = document.getElementById("im-save-products");
        btn.disabled = true;
        try {
          const res = await fetch(`/tenants/${encodeURIComponent(ingestModalTenantId)}/products`, {
            method: "PUT", headers: apiHeaders(), body: JSON.stringify(parsed)
          });
          if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || `HTTP ${res.status}`); }
          showMsg("im-save-products-msg", "Catalog saved.", "success");
          const t = tenants.find(t => t.id === ingestModalTenantId);
          if (t) t.tenantProductData = parsed;
        } catch (e) {
          showMsg("im-save-products-msg", "Error: " + e.message, "error");
        } finally { btn.disabled = false; }
      });

      document.getElementById("im-clear-products").addEventListener("click", async () => {
        if (!ingestModalTenantId) return;
        if (!confirm("Switch to global catalog? Custom catalog will be removed.")) return;
        const btn = document.getElementById("im-clear-products");
        btn.disabled = true;
        try {
          const res = await fetch(`/tenants/${encodeURIComponent(ingestModalTenantId)}/products`, {
            method: "DELETE", headers: apiHeaders()
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          document.getElementById("im-prod-global").checked = true;
          document.getElementById("im-custom-area").style.display = "none";
          document.getElementById("im-product-json").value = "";
          showMsg("im-save-products-msg", "Switched to global catalog.", "success");
          const t = tenants.find(t => t.id === ingestModalTenantId);
          if (t) t.tenantProductData = null;
        } catch (e) {
          showMsg("im-save-products-msg", "Error: " + e.message, "error");
        } finally { btn.disabled = false; }
      });

      document.getElementById("im-ingest-products").addEventListener("click", async () => {
        if (!ingestModalTenantId) return;
        hideMsg("im-products-msg");
        const btn = document.getElementById("im-ingest-products");
        btn.disabled = true;
        try {
          const res = await fetch(`/admin/ingest/${encodeURIComponent(ingestModalTenantId)}`, {
            method: "POST", headers: apiHeaders()
          });
          if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || `HTTP ${res.status}`); }
          const data = await res.json();
          showMsg("im-products-msg", `Done — ${data.count} product${data.count !== 1 ? "s" : ""} ingested.`, "success");
        } catch (e) {
          showMsg("im-products-msg", "Error: " + e.message, "error");
        } finally { btn.disabled = false; }
      });

      document.getElementById("im-save-articles").addEventListener("click", async () => {
        if (!ingestModalTenantId) return;
        hideMsg("im-articles-msg");
        const checked = [...document.querySelectorAll("#im-articles-list input[type=checkbox]:checked")]
          .map(cb => cb.value);
        const enabled = checked.length === availableArticles.length ? null : checked;
        const btn = document.getElementById("im-save-articles");
        btn.disabled = true;
        try {
          const res = await fetch(`/tenants/${encodeURIComponent(ingestModalTenantId)}/articles`, {
            method: "PATCH", headers: apiHeaders(), body: JSON.stringify({ enabled })
          });
          if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || `HTTP ${res.status}`); }
          showMsg("im-articles-msg", "Article selection saved.", "success");
          const t = tenants.find(t => t.id === ingestModalTenantId);
          if (t) t.enabledArticles = enabled;
        } catch (e) {
          showMsg("im-articles-msg", "Error: " + e.message, "error");
        } finally { btn.disabled = false; }
      });

      document.getElementById("im-ingest-articles").addEventListener("click", async () => {
        if (!ingestModalTenantId) return;
        hideMsg("im-articles-msg");
        const btn = document.getElementById("im-ingest-articles");
        btn.disabled = true;
        try {
          const res = await fetch(`/admin/ingest/articles/${encodeURIComponent(ingestModalTenantId)}`, {
            method: "POST", headers: apiHeaders()
          });
          if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || `HTTP ${res.status}`); }
          const data = await res.json();
          showMsg("im-articles-msg", `Done — ${data.count} chunk${data.count !== 1 ? "s" : ""} ingested.`, "success");
        } catch (e) {
          showMsg("im-articles-msg", "Error: " + e.message, "error");
        } finally { btn.disabled = false; }
      });

      document.getElementById("im-close").addEventListener("click", closeIngestModal);
      imModal.addEventListener("click", (e) => { if (e.target === imModal) closeIngestModal(); });

      // ── Global ingest ─────────────────────────────────────────────────────

      const runGlobalIngest = async (type) => {
        const btnId = type === "products" ? "ingest-all-products-btn" : "ingest-all-articles-btn";
        const btn = document.getElementById(btnId);
        btn.disabled = true;
        hideMsg("ingest-global-msg");
        if (tenants.length === 0) {
          showMsg("ingest-global-msg", "No tenants to ingest.", "error");
          btn.disabled = false;
          return;
        }
        let done = 0, failed = 0;
        showMsg("ingest-global-msg", `Running… (0/${tenants.length})`, "success");
        for (const t of tenants) {
          const url = type === "products"
            ? `/admin/ingest/${encodeURIComponent(t.id)}`
            : `/admin/ingest/articles/${encodeURIComponent(t.id)}`;
          try {
            const r = await fetch(url, { method: "POST", headers: apiHeaders() });
            if (!r.ok) throw new Error();
            done++;
          } catch { failed++; }
          showMsg("ingest-global-msg",
            `Running… (${done + failed}/${tenants.length}) — ${done} ok, ${failed} failed`, "success");
        }
        showMsg("ingest-global-msg",
          `Done — ${done} tenant${done !== 1 ? "s" : ""} ingested${failed > 0 ? `, ${failed} failed` : ""}.`,
          failed > 0 ? "error" : "success");
        btn.disabled = false;
      };

      // ── Event wiring ─────────────────────────────────────────────────────

      document.getElementById("sign-in-btn").addEventListener("click", signIn);
      document.getElementById("password-input").addEventListener("keydown", e => {
        if (e.key === "Enter") signIn();
      });
      document.getElementById("sign-out-btn").addEventListener("click", showAuthGate);
      document.getElementById("create-tenant-btn").addEventListener("click", createTenant);
      document.getElementById("new-tenant-name").addEventListener("keydown", e => {
        if (e.key === "Enter") createTenant();
      });
      document.getElementById("ingest-all-products-btn").addEventListener("click", () => runGlobalIngest("products"));
      document.getElementById("ingest-all-articles-btn").addEventListener("click", () => runGlobalIngest("articles"));

      // ── Init ─────────────────────────────────────────────────────────────

      (async () => {
        try {
          await initSupabase();
          const { data: { session } } = await sbClient.auth.getSession();
          if (session) {
            const check = await fetch("/tenants", { headers: { "Authorization": `Bearer ${session.access_token}` } });
            if (check.ok) {
              accessToken = session.access_token;
              showDashboard();
              return;
            }
          }
        } catch (e) {
          showMsg("auth-error", "Init error: " + e.message, "error");
        }
        document.getElementById("auth-section").style.display = "block";
      })();
    </script>
  </body>
</html>
